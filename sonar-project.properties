# SonarCloud Configuration — Colabs
#
# This file configures the SonarCloud analysis for the Colabs project.
# It ensures that the analysis focuses on your handwritten logic and
# ignores machine-generated or vendor-supplied boilerplate.

# Project identification
sonar.projectKey=SpaceyaTech_colabs.v2
sonar.organization=spaceyatech
sonar.projectName=colabs.v2

# Path to sources
sonar.sources=src
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Global Exclusions
# 1. Standard build and dependency folders
# 2. Machine-generated Supabase types (src/integrations/supabase/types.ts)
# 3. Shadcn/ui vendor components (src/components/ui/**)
sonar.exclusions=**/node_modules/**, **/dist/**, **/public/**, src/integrations/supabase/types.ts, src/components/ui/**

# Coverage exclusions
# Files that contain no testable logic or are purely structural
sonar.coverage.exclusions=**/src/vite-env.d.ts, **/src/main.tsx, **/src/index.css
