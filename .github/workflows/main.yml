# main.yml — Colabs
#
# Everything that runs AFTER a commit lands on main.
# This is the post-merge automation layer. It never blocks a PR.
#
# Jobs consolidated from:
#   - release.yml       (manual version bump, changelog, GitHub release) — replaced
#   - changelog.yml     (auto-commits CHANGELOG.md) — replaced
#
# Both are superseded by semantic-release, which is triggered here automatically
# on every push to main. semantic-release reads the commit messages and:
#   1. Determines the version bump (patch / minor / major) from commit types
#   2. Generates the CHANGELOG.md entry
#   3. Bumps package.json version
#   4. Commits the changelog and version bump back to main
#   5. Creates a vX.Y.Z git tag
#   6. Creates a GitHub Release with the generated notes
#
# Configuration lives in .releaserc.json at the repo root.
#
# Commit type → version bump mapping (from .releaserc.json angular preset):
#   feat:              minor bump   (1.2.x → 1.3.0)
#   fix:               patch bump   (1.2.3 → 1.2.4)
#   docs/chore/style:  no release
#   BREAKING CHANGE:   major bump   (1.x.x → 2.0.0)
#
# Secrets required:
#   GITHUB_TOKEN   — provided automatically (needs contents: write + issues: write)
#   NPM_TOKEN      — not needed (we don't publish to npm; set to a dummy if required)
#
# PAT note: If branch protection on main blocks Actions from pushing the
# changelog commit back, replace GITHUB_TOKEN in the release job with a PAT:
#   token: ${{ secrets.RELEASE_PAT }}
# The PAT needs repo + workflow scopes.

name: Main

on:
  push:
    branches:
      - main
  # Allow manual trigger — useful to re-run a failed release without a new commit
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Semantic release
  #
  # Runs on every push to main. semantic-release is idempotent — if the latest
  # commit was already released (e.g. the changelog commit it pushes back), it
  # exits cleanly with "no new commits to release".
  #
  # The [skip ci] tag on the changelog commit prevents an infinite loop:
  #   push to main → release → commits changelog → push to main → (would loop)
  # semantic-release adds [skip ci] automatically. GitHub Actions also skips
  # workflows when the commit message contains [skip ci].
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write # push changelog commit and tags
      issues: write # comment on issues closed by this release
      pull-requests: write # comment on PRs included in this release
      id-token: write # OIDC for npm provenance (future-proofing)

    steps:
      - name: Checkout main (full history for semantic-release)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      # Run CI checks one final time on main before releasing.
      # This guards against a merge that bypassed the PR checks (e.g. a direct
      # push by a maintainer or a hotfix that skipped the normal PR flow).
      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
          VITE_APP_URL: https://colabs.dev

      # semantic-release reads .releaserc.json at the repo root.
      # It will exit 0 (no release) if no releasable commits are found.
      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN is required by semantic-release's npm plugin even if you
          # are not publishing to npm. Either set a dummy value or disable the
          # npm plugin in .releaserc.json (see config file).
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
