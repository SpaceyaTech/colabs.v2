name: Greetings

on:
  pull_request_target:
  issues:

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Greet first-time contributors
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          issue-message: >
            👋 Welcome! Thanks for opening your first issue 💛  
            We’re glad you’re here. A maintainer will take a look soon.

          pr-message: >
            🚀 Thanks for your first PR — welcome aboard!  
            We appreciate your contribution. A review will follow shortly.
