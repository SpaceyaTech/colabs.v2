# agents-sync-check.yml
#
# Verifies that all AI agent adapter files are in sync with .agents/AGENTS.md.
#
# Runs on every PR that touches:
#   - .agents/AGENTS.md             (source changed — adapters need regenerating)
#   - Any adapter file             (adapter changed directly — may be out of sync)
#   - scripts/sync-agents.js       (sync script changed — re-verify output)
#
# If this check fails:
#   1. Run: npm run sync-agents
#   2. Commit all changed adapter files alongside .agents/AGENTS.md
#   3. Push — the check will re-run and pass

name: Agent instructions sync check

on:
  pull_request:
    paths:
      - '.agents/AGENTS.md'
      - '.agents/**'
      - 'CLAUDE.md'
      - '.cursor/rules/**'
      - '.github/copilot-instructions.md'
      - '.windsurfrules'
      - 'scripts/sync-agents.js'

jobs:
  sync-check:
    name: Agent files in sync with .agents/AGENTS.md
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate adapter files
        run: npm run sync-agents

      - name: Check for unexpected changes
        run: |
          if ! git diff --quiet; then
            echo ""
            echo "❌  Agent adapter files are out of sync with .agents/AGENTS.md."
            echo ""
            echo "    Changed files:"
            git diff --name-only | sed 's/^/      /'
            echo ""
            echo "    Fix: run 'npm run sync-agents' locally and commit the result."
            echo ""
            echo "    Note: .agents/frontend.md, .agents/backend.md, and"
            echo "    .agents/optimization.md are hand-maintained — edit them directly."
            echo ""
            git diff --stat
            exit 1
          fi
          echo "✓  All adapter files are in sync with .agents/AGENTS.md."
